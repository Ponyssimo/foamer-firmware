name: CLI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  clippy_check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cd foamer-cli && cargo clippy
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
        name: Clone
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        name: Setup toolchain
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - uses: clechasseur/rs-cargo@v5.0.4
        name: Build
        with:
          tool: cross
          command: build
          args: --release --target=${{ matrix.target }}
          working-directory: foamer-cli
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: cli
          path: |
            target/${{ matrix.target }}/release/foamer-cli
