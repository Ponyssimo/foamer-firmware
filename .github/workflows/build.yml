name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Build UF2
        run: cd foamer-firmware && cargo make uf2 --release

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            foamer-firmware/foamer-firmware.hex
            foamer-firmware/foamer-firmware.uf2
